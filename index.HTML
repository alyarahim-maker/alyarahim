<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kalkulator Pintar Ame & Team</title>

<style>
body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    background:linear-gradient(135deg,#ffd6e7,#ffeef5);
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.container{
    width:360px;
    background:white;
    padding:25px;
    border-radius:30px;
    box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

.user-identity{
    text-align:center;
    margin-bottom:15px;
}

.user-identity p{
    margin:0;
    color:#fd488acd;
    font-size:12px;
}

.user-identity h2{
    margin:5px 0;
    color:#880e4f;
    font-size:18px;
}

.display-area{
    background:#fff5f8;
    border-radius:20px;
    padding:20px;
    min-height:80px;
    display:flex;
    justify-content:flex-end;
    align-items:center;
    margin-bottom:20px;
}

#screen{
    margin:0;
    color:#f75596cf;
    font-size:38px;
    word-break:break-word;
    text-align:right;
    width:100%;
}

.mode-nav{
    display:flex;
    gap:10px;
    margin-bottom:20px;
}

.mode-btn{
    flex:1;
    padding:12px;
    border:none;
    border-radius:15px;
    cursor:pointer;
    font-weight:bold;
}

.active{
    background:#f26d9ae7;
    color:white;
}

.inactive{
    background:#f8bbd0;
    color:#b03a79;
}

.btn-grid{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:10px;
}

.btn{
    height:65px;
    border:none;
    border-radius:18px;
    font-size:22px;
    cursor:pointer;
    font-weight:bold;
}

.btn:active{
    transform:scale(0.95);
}

.dark{background:#fff;color:#333;border:1px solid #f8bbd0;}
.light{background:#fce4ec;color:#ad1457;}
.orange{background:#f48fb1;color:white;}
.scientific{background:#f25e8fe5;color:white;font-size:15px;}

.zero{
    grid-column:span 2;
}

#storyPanel{
    display:none;
    flex-direction:column;
    gap:15px;
}

textarea{
    width:100%;
    height:120px;
    resize:none;
    border-radius:15px;
    border:2px solid #f8bbd0;
    padding:15px;
    box-sizing:border-box;
}

.solve-btn{
    padding:15px;
    border:none;
    border-radius:15px;
    background:#ec407a;
    color:white;
    font-weight:bold;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="container">

<div class="user-identity">
<p>Kalkulator Project</p>
<h2>Alya, Amaliyah, Aisyah</h2>
</div>

<div class="display-area">
<h1 id="screen">0</h1>
</div>

<div class="mode-nav">
<button id="btnCalc" class="mode-btn active" onclick="showPanel('calc')">Kalkulator</button>
<button id="btnStory" class="mode-btn inactive" onclick="showPanel('story')">Soal Cerita</button>
</div>

<!-- PANEL KALKULATOR -->
<div id="calcPanel" class="btn-grid">

<button class="btn scientific" onclick="append('Math.sin(')">sin</button>
<button class="btn scientific" onclick="append('Math.cos(')">cos</button>
<button class="btn scientific" onclick="append('Math.tan(')">tan</button>
<button class="btn orange" onclick="append('/')">÷</button>

<button class="btn light" onclick="clearScreen()">AC</button>
<button class="btn light" onclick="toggleSign()">+/-</button>
<button class="btn light" onclick="append('%')">%</button>
<button class="btn orange" onclick="append('*')">×</button>

<button class="btn dark" onclick="append('7')">7</button>
<button class="btn dark" onclick="append('8')">8</button>
<button class="btn dark" onclick="append('9')">9</button>
<button class="btn orange" onclick="append('-')">-</button>

<button class="btn dark" onclick="append('4')">4</button>
<button class="btn dark" onclick="append('5')">5</button>
<button class="btn dark" onclick="append('6')">6</button>
<button class="btn orange" onclick="append('+')">+</button>

<button class="btn dark" onclick="append('1')">1</button>
<button class="btn dark" onclick="append('2')">2</button>
<button class="btn dark" onclick="append('3')">3</button>
<button class="btn orange" onclick="calculate()">=</button>

<button class="btn dark zero" onclick="append('0')">0</button>
<button class="btn dark" onclick="append('.')">.</button>

</div>

<!-- PANEL SOAL CERITA -->
<div id="storyPanel">
<textarea id="storyInput" placeholder="Contoh: Alya punya 10 apel beli lagi 5 berapa jumlah apel alya?"></textarea>
<button class="solve-btn" onclick="solveStory()">Dapatkan Jawaban ✨</button>
</div>

</div>

<script>
const screen = document.getElementById("screen");

function showPanel(type){
    const calcPanel = document.getElementById("calcPanel");
    const storyPanel = document.getElementById("storyPanel");
    const btnCalc = document.getElementById("btnCalc");
    const btnStory = document.getElementById("btnStory");

    if(type === "calc"){
        calcPanel.style.display = "grid";
        storyPanel.style.display = "none";
        btnCalc.className = "mode-btn active";
        btnStory.className = "mode-btn inactive";
    }else{
        calcPanel.style.display = "none";
        storyPanel.style.display = "flex";
        btnCalc.className = "mode-btn inactive";
        btnStory.className = "mode-btn active";
    }
}

function append(val){
    if(screen.innerText === "0" || screen.innerText.includes("adalah")){
        screen.innerText = val;
    }else{
        screen.innerText += val;
    }
}

function clearScreen(){
    screen.innerText = "0";
    screen.style.fontSize = "38px";
}

function toggleSign(){
    let num = parseFloat(screen.innerText);
    if(!isNaN(num)){
        screen.innerText = num * -1;
    }
}

function calculate(){
    try{
        let result = eval(screen.innerText);
        screen.innerText = Number.isInteger(result) ? result : result.toFixed(2);
    }catch{
        screen.innerText = "Error";
    }
}

function solveStory(){
    const text = document.getElementById("storyInput").value.toLowerCase();

    if(text.includes("siapa") && text.includes("nama")){
        screen.style.fontSize = "20px";
        screen.innerText = "Nama saya Alya,Aisyah, Amaliyah";
        showPanel("calc");
        return;
    }

    const nums = text.match(/\d+(\.\d+)?/g);

    if(!nums || nums.length < 2){
        alert("Masukkan minimal 2 angka!");
        return;
    }

    let a = parseFloat(nums[0]);
    let b = parseFloat(nums[1]);
    let result = 0;
    let status = "Total";

    if(text.includes("kurang") || text.includes("sisa") || text.includes("hilang")){
        result = a - b;
        status = "Sisa";
    }
    else if(text.includes("kali")){
        result = a * b;
        status = "Hasil kali";
    }
    else if(text.includes("bagi")){
        result = a / b;
        status = "Hasil bagi";
    }
    else{
        result = a + b;
        status = "Total";
    }

    screen.style.fontSize = "22px";
    screen.innerText = status + " adalah " + result;

    showPanel("calc");
}
</script>

</body>
</html>
